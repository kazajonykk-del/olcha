<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olcha Cafe | Professional Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: #fff; overflow-x: hidden; }
        .font-oswald { font-family: 'Oswald', sans-serif; }
        .glass { background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .cat-btn.active { background: #eab308; color: #000; font-weight: 800; transform: scale(1.05); }
        .product-card { background: #111; border-radius: 24px; overflow: hidden; border: 1px solid #222; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { border-color: #eab308; transform: translateY(-8px) scale(1.01); box-shadow: 0 15px 30px -5px rgba(234, 179, 8, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input::placeholder { color: rgba(255,255,255,0.3); }

        /* --- SAVATCHA ANIMATSIYASI --- */
        @keyframes cartBump {
            0% { transform: scale(1); }
            15% { transform: scale(1.3) rotate(-10deg); }
            30% { transform: scale(1.3) rotate(10deg); }
            45% { transform: scale(1.3) rotate(-5deg); }
            60% { transform: scale(1.3) rotate(5deg); }
            100% { transform: scale(1); }
        }

        @keyframes cartPulse {
            0% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(234, 179, 8, 0); }
            100% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0); }
        }

        .cart-animate {
            animation: cartBump 0.8s ease-out;
        }

        .cart-pulse-active {
            animation: cartPulse 1.5s infinite;
        }

        #cart-count.count-bump {
            animation: bounceIn 0.5s;
        }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 glass px-4 py-4 shadow-2xl">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="font-oswald text-2xl md:text-3xl text-yellow-500 tracking-tighter uppercase flex items-center gap-2">
                <span class="animate__animated animate__pulse animate__infinite">🍒</span> Olcha Cafe
            </h1>
            <button onclick="toggleCart()" id="cart-btn" class="relative bg-yellow-500 text-black p-3.5 rounded-2xl shadow-lg transition-all active:scale-90 cart-pulse-active">
                <i class="fas fa-shopping-basket text-xl"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-red-600 text-white text-[11px] w-6 h-6 flex items-center justify-center rounded-full font-bold border-2 border-black">0</span>
            </button>
        </div>
        
        <div class="flex overflow-x-auto gap-2.5 mt-4 no-scrollbar border-t border-white/5 pt-3.5 px-1 md:justify-center">
            <button onclick="filterMenu('all')" class="cat-btn active px-6 py-2.5 rounded-xl text-xs uppercase whitespace-nowrap transition-all duration-300">Hammasi</button>
            <button onclick="filterMenu('lavash')" class="cat-btn px-5 py-2.5 rounded-xl glass text-xs uppercase whitespace-nowrap transition-all duration-300">Lavash</button>
            <button onclick="filterMenu('burger')" class="cat-btn px-5 py-2.5 rounded-xl glass text-xs uppercase whitespace-nowrap transition-all duration-300">Burger</button>
            <button onclick="filterMenu('doner')" class="cat-btn px-5 py-2.5 rounded-xl glass text-xs uppercase whitespace-nowrap transition-all duration-300">Doner</button>
            <button onclick="filterMenu('hotdog')" class="cat-btn px-5 py-2.5 rounded-xl glass text-xs uppercase whitespace-nowrap transition-all duration-300">Hot-Dog</button>
            <button onclick="filterMenu('kfc')" class="cat-btn px-5 py-2.5 rounded-xl glass text-xs uppercase whitespace-nowrap transition-all duration-300">KFC & Fri</button>
            <button onclick="filterMenu('ichimlik')" class="cat-btn px-5 py-2.5 rounded-xl glass text-xs uppercase whitespace-nowrap transition-all duration-300">Ichimlik</button>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div id="menu-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-5 md:gap-7"></div>
    </main>

    <footer class="glass mt-12 p-12 rounded-t-[3.5rem] border-t border-yellow-500/20">
        <div class="container mx-auto grid md:grid-cols-2 gap-12">
            <div class="animate__animated animate__fadeInLeft">
                <h3 class="font-oswald text-3xl text-yellow-500 mb-8 uppercase tracking-tight">Aloqa & Manzil</h3>
                <div class="space-y-6">
                    <a href="tel:+998917677455" class="block group">
                        <p class="text-3xl font-black text-white flex items-center gap-4 group-hover:text-yellow-400 transition">
                            <i class="fas fa-phone-alt text-yellow-500 group-hover:animate__animated group-hover:animate__tada"></i> 
                            +998 91 767 74 55
                        </p>
                    </a>
                    <p class="text-lg opacity-80 font-bold flex items-center gap-4">
                        <i class="fas fa-map-marker-alt text-red-500 text-2xl"></i> Bog'ishamol shifoxonasi orqasida
                    </p>
                    <div class="flex gap-5 pt-5">
                        <a href="https://t.me/OlchaKafebot" target="_blank" class="w-14 h-14 glass rounded-full flex items-center justify-center text-blue-400 text-2xl hover:bg-blue-500 hover:text-white transition active:scale-90"><i class="fab fa-telegram-plane"></i></a>
                        <a href="https://instagram.com/OLCHA_KAFE" target="_blank" class="w-14 h-14 glass rounded-full flex items-center justify-center text-pink-500 text-2xl hover:bg-pink-500 hover:text-white transition active:scale-90"><i class="fab fa-instagram"></i></a>
                    </div>
                </div>
            </div>
            <div class="animate__animated animate__fadeInRight bg-black/50 p-3 rounded-3xl border border-white/5 shadow-inner overflow-hidden h-72">
                <iframe 
                    width="100%" 
                    height="100%" 
                    frameborder="0" 
                    scrolling="no" 
                    marginheight="0" 
                    marginwidth="0" 
                    class="rounded-2xl grayscale"
                    src="https://maps.google.com/maps?q=41.017056,71.205139&hl=uz&z=17&amp;output=embed">
                </iframe>
            </div>
        </div>
        <div class="text-center mt-12 border-t border-white/5 pt-8">
            <p class="text-[10px] text-gray-600 uppercase tracking-[0.5em] font-bold">Admin: Nozimxon • Buyurtmalar avtomatik ravishda botga yo'naltiriladi.</p>
        </div>
    </footer>

    <div id="cart-modal" class="fixed inset-0 z-[100] hidden flex justify-end bg-black/95 backdrop-blur-md">
        <div class="w-full max-w-md bg-[#080808] h-full flex flex-col shadow-3xl animate__animated animate__fadeInRight animate__faster">
            <div class="p-7 flex justify-between items-center border-b border-white/10 bg-yellow-500/5">
                <h2 class="font-oswald text-2xl text-yellow-500 uppercase tracking-tight">Sizning Buyurtmangiz</h2>
                <button onclick="toggleCart()" class="text-5xl text-gray-600 hover:text-red-500 transition active:scale-75">&times;</button>
            </div>
            
            <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar"></div>

            <div class="p-8 border-t border-white/10 bg-black rounded-t-3xl">
                <div class="mb-7">
                    <label class="block text-[11px] uppercase font-bold text-gray-500 mb-2.5 ml-1 tracking-widest">Telefon raqamingiz:</label>
                    <input type="tel" id="user-phone" placeholder="+998 90 123 45 67" 
                           class="w-full bg-white/5 border border-white/10 p-4.5 rounded-2xl text-white text-lg focus:outline-none focus:border-yellow-500 focus:bg-yellow-500/5 transition">
                </div>

                <div class="flex justify-between items-end mb-7 p-3 glass rounded-xl border-white/5 shadow-inner">
                    <span class="text-gray-500 text-xs font-bold uppercase tracking-wider">Umumiy summa:</span>
                    <span id="total-price" class="text-3xl font-black text-yellow-500">0 so'm</span>
                </div>
                
                <button onclick="sendToTelegram()" class="w-full bg-green-600 hover:bg-green-500 text-white py-5.5 rounded-2xl font-black text-xl shadow-2xl shadow-green-900/30 active:scale-95 transition-all uppercase tracking-tight flex items-center justify-center gap-3">
                    <i class="fab fa-telegram-plane text-2xl"></i> Buyurtmani Tasdiqlash
                </button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // AOS Animatsiyalarini ishga tushirish (agar kerak bo'lsa, kardlar uchun data-aos qo'shish mumkin)
        // AOS.init({ duration: 800, once: true });

        const menuData = [
            // LAVASH
            { id: 1, name: "Lavash Classic", price: 26000, cat: "lavash", img: "https://images.unsplash.com/photo-1565299585323-38d6b0865b47?w=500"  },
            { id: 2, name: "Lavash Sirli", price: 30000, cat: "lavash", img: "https://images.unsplash.com/photo-1565299585323-38d6b0865b47?w=500" },
            { id: 3, name: "Lavash Tandir", price: 30000, cat: "lavash", img: "https://media.istockphoto.com/id/1183311685/photo/sandwich-kebab-burrito-chicken-pork-wrap-shawarma-street-food.jpg?s=612x612&w=0&k=20&c=6I6_t2yR_K17vL7f8eXk-9372U5Rk0f85v-U-l-k4-o=" },
            { id: 4, name: "Lavash Tovuqli", price: 25000, cat: "lavash", img: "https://images.unsplash.com/photo-1565299585323-38d6b0865b47?w=500"  },

            // BURGER
            { id: 5, name: "Burger Classic", price: 25000, cat: "burger", img: "https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=500" },
            { id: 6, name: "Burger Sirli", price: 30000, cat: "burger", img: "https://images.unsplash.com/photo-1586190848861-99aa4a171e90?w=500" },
            { id: 7, name: "Burger 2X", price: 35000, cat: "burger", img: "https://images.unsplash.com/photo-1550547660-d9450f859349?w=500" },
            { id: 8, name: "Klab Sendvich", price: 30000, cat: "burger", img: "https://images.pexels.com/photos/1603901/pexels-photo-1603901.jpeg?w=400" },

            // DONER
            { id: 9, name: "Doner Classic", price: 24000, cat: "doner", img: "https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=500" },
            { id: 10, name: "Doner Sirli", price: 28000, cat: "doner", img: "https://images.unsplash.com/photo-1642940250097-f58c704c3210?w=500" },
            { id: 11, name: "Non Kabob", price: 30000, cat: "doner", img: "https://images.pexels.com/photos/461198/pexels-photo-461198.jpeg?w=400" },

            // HOT-DOG
            { id: 12, name: "Hot-Dog Classic", price: 10000, cat: "hotdog", img: "https://images.unsplash.com/photo-1599599810694-b5b37304c041?w=500" },
            { id: 13, name: "Hot-Dog 2 xisali", price: 12000, cat: "hotdog", img: "https://images.unsplash.com/photo-1612392062631-94dd858cba88?w=500" },
            { id: 14, name: "Hot-Dog America", price: 14000, cat: "hotdog", img: "https://images.unsplash.com/photo-1541214113241-21578d2d9b62?w=500" },

            // KFC
            { id: 15, name: "KFC Laxm", price: 20000, cat: "kfc", img: "https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec?w=500" },
            { id: 16, name: "KFC Qanot", price: 20000, cat: "kfc", img: "https://images.unsplash.com/photo-1567620832903-9fc6debc209f?w=500" },
            { id: 17, name: "Kartoshka Fri", price: 10000, cat: "kfc", img: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=500" },

            // ICHIMLIK
            { id: 18, name: "Pepsi 1.5 L", price: 15000, cat: "ichimlik", img: "https://images.unsplash.com/photo-1629203851020-9dd4ac787364?w=500" },
            { id: 19, name: "Coca-Cola 1.5 L", price: 15000, cat: "ichimlik", img: "https://images.unsplash.com/photo-1554866585-cd94860890b7?w=500" },
            { id: 20, name: "Choy (Krujka)", price: 2000, cat: "ichimlik", img: "https://images.unsplash.com/photo-1576092768241-dec231879fc3?w=500" }
        ];

        let cart = {};

        function renderMenu(category = 'all') {
            const grid = document.getElementById('menu-grid');
            const filtered = category === 'all' ? menuData : menuData.filter(x => x.cat === category);
            grid.innerHTML = filtered.map((p, idx) => `
                <div class="product-card animate__animated animate__fadeInUp" style="animation-delay: ${idx * 50}ms">
                    <div class="h-32 md:h-48 overflow-hidden group">
                        <img src="${p.img}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                    </div>
                    <div class="p-4 md:p-5">
                        <h3 class="text-xs md:text-sm font-bold h-10 line-clamp-2 uppercase tracking-tight text-white/90">${p.name}</h3>
                        <div class="flex justify-between items-center mt-3.5">
                            <span class="text-yellow-500 font-black text-sm md:text-lg">${p.price.toLocaleString()} s.</span>
                            <button onclick="addToCart(${p.id}, this)" class="bg-yellow-500 text-black w-10 h-10 rounded-xl shadow-lg active:scale-90 transition hover:bg-white flex items-center justify-center">
                                <i class="fas fa-plus text-xs"></i>
                            </button>
                        </div>
                    </div>
                </div>`).join('');
        }

        function filterMenu(cat) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderMenu(cat);
        }

        function addToCart(id, buttonEl) {
            const p = menuData.find(x => x.id === id);
            cart[id] = cart[id] ? { ...cart[id], qty: cart[id].qty + 1 } : { ...p, qty: 1 };
            
            // --- ANIMATSIYA QISMI ---
            const cartBtn = document.getElementById('cart-btn');
            const cartCount = document.getElementById('cart-count');
            
            // 1. Tugma bosilganda savat tugmasi Bump qiladi va Pulsatsiya to'xtaydi
            cartBtn.classList.add('cart-animate');
            cartBtn.classList.remove('cart-pulse-active');
            
            // 2. Hisoblagich Bump qiladi
            cartCount.classList.add('count-bump');
            
            // 3. Taom kardidagi plyus tugmasi yashil bo'lib o'zgaradi
            buttonEl.classList.remove('bg-yellow-500');
            buttonEl.classList.add('bg-green-500', 'text-white');
            buttonEl.innerHTML = '<i class="fas fa-check text-xs"></i>';

            // 4. Animatsiyalarni to'xtatish va asliga qaytarish (0.8 soniyadan keyin)
            setTimeout(() => {
                cartBtn.classList.remove('cart-animate');
                cartBtn.classList.add('cart-pulse-active'); // Pulsatsiyani qaytarish
                cartCount.classList.remove('count-bump');
                
                buttonEl.classList.remove('bg-green-500', 'text-white');
                buttonEl.classList.add('bg-yellow-500', 'text-black');
                buttonEl.innerHTML = '<i class="fas fa-plus text-xs"></i>';
            }, 800);
            
            updateUI();
        }

        function updateUI() {
            const itemsCont = document.getElementById('cart-items');
            const cartCount = document.getElementById('cart-count');
            const totalPrice = document.getElementById('total-price');
            let total = 0, count = 0, html = "";
            Object.values(cart).forEach(item => {
                total += item.price * item.qty;
                count += item.qty;
                html += `<div class="flex items-center gap-4 bg-white/5 p-4 rounded-2xl border border-white/5 animate__animated animate__fadeInLeft animate__faster">
                        <img src="${item.img}" class="w-14 h-14 rounded-xl object-cover border border-white/10">
                        <div class="flex-1">
                            <h4 class="text-xs font-bold uppercase text-white/90 tracking-tight">${item.name}</h4>
                            <p class="text-yellow-500 text-xs font-black mt-0.5">${item.price.toLocaleString()} s.</p>
                        </div>
                        <div class="flex items-center gap-3 bg-black rounded-full p-1 border border-white/5 shadow-inner">
                            <button onclick="changeQty(${item.id}, -1)" class="w-8 h-8 rounded-full bg-white/10 hover:bg-red-500/20 hover:text-red-500 transition active:scale-75">-</button>
                            <span class="font-bold text-sm text-white w-3 text-center">${item.qty}</span>
                            <button onclick="changeQty(${item.id}, 1)" class="w-8 h-8 rounded-full bg-white/10 hover:bg-green-500/20 hover:text-green-500 transition active:scale-75">+</button>
                        </div></div>`;
            });
            itemsCont.innerHTML = html || '<p class="text-center opacity-20 py-20 text-xs uppercase tracking-[0.3em] font-bold">Savat bo\'sh...</p>';
            cartCount.innerText = count;
            totalPrice.innerText = total.toLocaleString() + " so'm";
        }

        function changeQty(id, delta) {
            cart[id].qty += delta;
            if (cart[id].qty <= 0) delete cart[id];
            updateUI();
        }

        function toggleCart() { document.getElementById('cart-modal').classList.toggle('hidden'); }
function sendToTelegram() {
    const phone = document.getElementById('user-phone').value;
    if (Object.keys(cart).length === 0) return alert("Savat bo'sh!");
    if (!phone || phone.length < 9) return alert("Iltimos, telefon raqamingizni to'liq kiriting!");
    
    let msg = "♨️ YANGI BUYURTMA\n\n";
    msg += `📱 Tel: ${phone}\n`;
    msg += `------------------------\n`;
    Object.values(cart).forEach(i => {
        msg += `✅ ${i.name} (${i.qty} dona) — ${(i.price * i.qty).toLocaleString()} s.\n`;
    });
    msg += `\n💰 JAMI: ${document.getElementById('total-price').innerText}`;

    // WebApp orqali botga ma'lumot yuborish
    if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.sendData(msg); 
        window.Telegram.WebApp.close(); // Xabar ketgach sayt yopiladi
    } else {
        // Agar brauzerda ochilgan bo'lsa, eski usulda yuboradi
        window.open(`https://t.me/OlchaKafebot?text=${encodeURIComponent(msg)}`, '_blank');
    }
}
    </script>
</body>
</html>
