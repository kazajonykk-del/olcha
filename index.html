        let cart = {};
        let deliveryType = 'takeout';

        function filterMenu(category, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            else document.querySelector("button[onclick*='all']").classList.add('active');

            document.body.style.backgroundImage = `url('${backgrounds[category] || backgrounds.all}')`;

            const grid = document.getElementById('menu-grid');
            const filtered = category === 'all' ? menuData : menuData.filter(x => x.cat === category);
            
            grid.innerHTML = filtered.map(p => `
                <div class="product-card p-3 animate__animated animate__fadeInUp">
                    <img src="${p.img}" class="w-full h-28 object-cover rounded-xl mb-3">
                    <h3 class="text-[11px] font-bold uppercase truncate">${p.name}</h3>
                    <div class="flex justify-between items-center mt-3">
                        <span class="text-yellow-500 font-bold text-xs">${p.price.toLocaleString()} s.</span>
                        <button onclick="addToCart(${p.id})" class="bg-yellow-500 text-black w-8 h-8 rounded-lg flex items-center justify-center active:scale-75 transition-all">
                            <i class="fas fa-plus text-xs"></i>
                        </button>
                    </div>
                </div>`).join('');
        }

        function addToCart(id) {
            const p = menuData.find(x => x.id === id);
            cart[id] = cart[id] ? { ...cart[id], qty: cart[id].qty + 1 } : { ...p, qty: 1 };
            updateUI();
        }

        function updateUI() {
            const itemsCont = document.getElementById('cart-items');
            let total = 0, count = 0, html = "";
            Object.values(cart).forEach(item => {
                total += item.price * item.qty;
                count += item.qty;
                html += `<div class="flex items-center justify-between bg-white/5 p-3 rounded-xl border border-white/5">
                    <div class="text-[10px] font-bold uppercase w-1/2">${item.name}</div>
                    <div class="flex items-center gap-3">
                        <button onclick="changeQty(${item.id}, -1)" class="w-7 h-7 bg-white/10 rounded-full">-</button>
                        <span class="font-bold text-sm">${item.qty}</span>
                        <button onclick="changeQty(${item.id}, 1)" class="w-7 h-7 bg-white/10 rounded-full">+</button>
                    </div>
                </div>`;
            });
            itemsCont.innerHTML = html || '<p class="text-center opacity-20 py-10">Savat bo\'sh</p>';
            document.getElementById('cart-count').innerText = count;
            document.getElementById('total-price').innerText = total.toLocaleString() + " so'm";
        }

        function changeQty(id, delta) {
            cart[id].qty += delta;
            if (cart[id].qty <= 0) delete cart[id];
            updateUI();
        }

        function toggleCart() { document.getElementById('cart-modal').classList.toggle('hidden'); }

        function setDelivery(type) {
            deliveryType = type;
            document.getElementById('btn-takeout').classList.toggle('active-type', type === 'takeout');
            document.getElementById('btn-delivery').classList.toggle('active-type', type === 'delivery');
            document.getElementById('location-section').classList.toggle('hidden', type === 'takeout');
            if(type === 'takeout') document.getElementById('user-location').value = "Olib ketish";
        }

        function getLocation() {
            const btn = document.getElementById('loc-btn');
            btn.innerText = "Aniqlanmoqda...";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const link = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    document.getElementById('user-location').value = link;
                    btn.innerText = "Lokatsiya saqlandi ✅";
                    btn.classList.replace('text-blue-400', 'text-green-400');
                }, () => { alert("Ruxsat berilmadi!"); btn.innerText = "Xatolik!"; });
            }
        }

        async function sendToTelegram() {
            const name = document.getElementById('user-name').value;
            const phone = document.getElementById('user-phone').value;
            const location = document.getElementById('user-location').value;

            if (Object.keys(cart).length === 0 || !name || !phone) return alert("Ma'lumotlarni to'ldiring!");
            if (deliveryType === 'delivery' && (location === 'Olib ketish' || !location.includes('http'))) {
                return alert("Iltimos, lokatsiyani yuboring!");
            }

            let msg = `♨️ **YANGI BUYURTMA**\n\n`;
            msg += `👤 Mijoz: ${name}\n`;
            msg += `📱 Tel: ${phone}\n`;
            msg += `📦 Turi: ${deliveryType === 'delivery' ? 'Yetkazib berish' : 'Olib ketish'}\n`;
            msg += `📍 Lokatsiya: ${location}\n\n`;
            
            Object.values(cart).forEach(i => {
                msg += `✅ ${i.name} (${i.qty}x) — ${(i.price * i.qty).toLocaleString()} s.\n`;
            });
            msg += `\n💰 **JAMI: ${document.getElementById('total-price').innerText}**`;

            // Mini App orqali yuborish
            if (window.Telegram?.WebApp && window.Telegram.WebApp.initData) {
                window.Telegram.WebApp.sendData(msg);
            } else {
                // To'g'ridan-to'g'ri API orqali
                try {
                    await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ chat_id: adminId, text: msg, parse_mode: "Markdown" })
                    });
                    alert("Buyurtmangiz yuborildi! ✅");
                    toggleCart();
                    cart = {};
                    updateUI();
                } catch (e) { alert("Xatolik!"); }
            }
        }

        // Birinchi yuklash
        filterMenu('all');
    </script>
