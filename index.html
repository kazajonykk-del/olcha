            { id: 13, name: "Hot-Dog 2 xisali", price: 12000, cat: "hotdog", img: "https://images.unsplash.com/photo-1612392062631-94dd858cba88?w=500" },

            { id: 16, name: "KFC Qanot", price: 20000, cat: "kfc", img: "https://images.unsplash.com/photo-1567620832903-9fc6debc209f?w=500" },
            { id: 17, name: "Kartoshka Fri", price: 10000, cat: "kfc", img: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=500" },

            { id: 18, name: "Pepsi 1.5 L", price: 15000, cat: "ichimlik", img: "https://images.unsplash.com/photo-1629203851020-9dd4ac787364?w=500" },
            { id: 19, name: "Coca-Cola 1.5 L", price: 15000, cat: "ichimlik", img: "https://images.unsplash.com/photo-1554866585-cd94860890b7?w=500" },

        ];

        

        let cart = {};

        function renderMenu(category = 'all') {
            const grid = document.getElementById('menu-grid');
            const filtered = category === 'all' ? menuData : menuData.filter(x => x.cat === category);
            grid.innerHTML = filtered.map(p => `
                <div class="product-card animate__animated animate__fadeInUp">
                    <img src="${p.img}" class="w-full h-32 object-cover rounded-t-2xl">
                    <div class="p-4">
                        <h3 class="text-[11px] font-extrabold uppercase truncate text-white/90">${p.name}</h3>
                        <div class="flex justify-between items-center mt-3">
                            <span class="text-yellow-500 font-black text-sm">${p.price.toLocaleString()} s.</span>
                            <button onclick="addToCart(${p.id})" class="bg-yellow-500 text-black w-8 h-8 rounded-lg flex items-center justify-center active:scale-75 transition-all">
                                <i class="fas fa-plus text-xs"></i>
                            </button>
                        </div>
                    </div>
                </div>`).join('');
        }

        function addToCart(id) {
            const p = menuData.find(x => x.id === id);
            cart[id] = cart[id] ? { ...cart[id], qty: cart[id].qty + 1 } : { ...p, qty: 1 };
            const cartBtn = document.getElementById('cart-btn');
            cartBtn.classList.add('cart-added');
            setTimeout(() => cartBtn.classList.remove('cart-added'), 500);
            updateUI();
        }

        function updateUI() {
            const itemsCont = document.getElementById('cart-items');
            const cartCount = document.getElementById('cart-count');
            const totalPrice = document.getElementById('total-price');
            let total = 0, count = 0, html = "";
            Object.values(cart).forEach(item => {
                total += item.price * item.qty;
                count += item.qty;
                html += `<div class="flex items-center gap-3 bg-white/5 p-3 rounded-xl border border-white/5">
                    <div class="flex-1 font-bold text-xs uppercase">${item.name}</div>
                    <div class="flex items-center gap-2">
                        <button onclick="changeQty(${item.id}, -1)" class="w-7 h-7 bg-white/10 rounded-full">-</button>
                        <span class="text-sm font-black">${item.qty}</span>
                        <button onclick="changeQty(${item.id}, 1)" class="w-7 h-7 bg-white/10 rounded-full">+</button>
                    </div>
                </div>`;
            });
            itemsCont.innerHTML = html || '<p class="text-center opacity-20 py-10 uppercase text-xs font-black tracking-widest">Savat bo\'sh</p>';
            cartCount.innerText = count;
            totalPrice.innerText = total.toLocaleString() + " so'm";
        }

        function changeQty(id, delta) {
            cart[id].qty += delta;
            if (cart[id].qty <= 0) delete cart[id];
            updateUI();
        }

        function toggleCart() { document.getElementById('cart-modal').classList.toggle('hidden'); }

        function filterMenu(cat) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderMenu(cat);
        }

        async function sendToTelegram() {
    const name = document.getElementById('user-name').value;
    const phone = document.getElementById('user-phone').value;

    if (!name || !phone) return alert("Ism va telefonni kiriting!");

    // MAJBURIY LOKATSIYA OLISH
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(async (position) => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;

            let msg = `♨️ **BUYURTMA + LOKATSIYA**\n\n`;
            msg += `👤 Mijoz: ${name}\n📱 Tel: ${phone}\n`;
            msg += `📍 Manzil: [Xaritada ko'rish](${mapLink})\n`;
            msg += `----------------------------\n`;

            Object.values(cart).forEach(i => {
                msg += `✅ ${i.name} (${i.qty}x)\n`;
            });
            msg += `\n💰 JAMI: ${document.getElementById('total-price').innerText}`;

            // Botga yuborish
            if (window.Telegram.WebApp) {
                window.Telegram.WebApp.sendData(msg);
                window.Telegram.WebApp.close();
            }
        }, () => {
            alert("Xatolik: Lokatsiyaga ruxsat bermasangiz buyurtma bera olmaysiz! ❌");
        });
    } else {
        alert("Brauzeringiz lokatsiyani qo'llab-quvvatlamaydi.");
    }
}
